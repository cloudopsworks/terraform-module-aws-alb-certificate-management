# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
    confirm: true
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
    confirm: true
  # End - Generic Boilerplate Variables Setup
  - name: alb_enabled
    order: 2
    description: "Enable ALB for this product? (default: true)"
    type: bool
    default: true
    confirm: true
  - name: alb_path
    order: 3
    description: "ALB Path for this product (e.g. ../sandbox-alb-instance)"
    type: string
    default: "../alb"
    confirm: true

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"